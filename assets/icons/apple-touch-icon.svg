<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Full-bleed navy background (iOS rounds corners automatically) -->
  <rect width="180" height="180" fill="#0f172a"/>
  <!-- Single solid teal ring — thin, clean, no dashes -->
  <circle cx="90" cy="90" r="72" fill="none" stroke="#14b8a6" stroke-width="5"/>
  <!-- Very bold R, large and centred — no DSS subtitle -->
  <text x="90" y="120"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="100" font-weight="800"
        text-anchor="middle" fill="#14b8a6"
        letter-spacing="-4">R</text>
</svg>