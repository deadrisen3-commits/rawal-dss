<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Solid teal disc — no thin strokes, no dashes, crisp at any size -->
  <circle cx="32" cy="32" r="32" fill="#14b8a6"/>
  <!-- Bold monospace R, dark navy, tightly centred -->
  <text x="32" y="46"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="44" font-weight="800"
        text-anchor="middle" fill="#0f172a"
        letter-spacing="-2">R</text>
</svg>